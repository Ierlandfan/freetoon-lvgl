; freetoon ESP32 display client — for the "Cheap Yellow Display"
; ESP32-2432S028R (ESP32-WROOM, 2.8" 320x240 ILI9341 + XPT2046 touch).
;
; It joins WiFi and talks to the Toon's PWA API (pwa_server on :10081):
;   GET  /api/state      → thermostat/boiler/air JSON
;   POST /api/setpoint   → {"value":"18.50"}
;   POST /api/program    → {"state":0..3}
; No BoxTalk — just HTTP/JSON over the LAN.
;
; Configure WiFi + Toon IP in src/config.h, then:  pio run -t upload
;
; NOTE: the classic single-micro-USB CYD is ILI9341 (default below). The newer
; USB-C "2-USB" board uses ST7789 — swap ILI9341_2_DRIVER for ST7789_DRIVER.

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; Default app partition (~1.3 MB) is too tight for LVGL+TFT+WiFi; use the
; 3 MB single-app layout (4 MB flash, no OTA).
board_build.partitions = huge_app.csv
lib_deps =
    lvgl/lvgl @ ^8.3.11
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson @ ^7.0.4
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -I src
    ; ---- TFT_eSPI setup for the CYD, via build flags (no User_Setup.h edits) ----
    -D USER_SETUP_LOADED=1
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000
    -D SPI_TOUCH_FREQUENCY=2500000
